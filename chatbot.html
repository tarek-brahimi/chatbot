<html>
  <head>
    <title>React Basics</title>
  </head>

  <body>
    <div class="js-container"></div>
    <div></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
   

    <script type="text/babel">
   
      function UserMessage({ message, sender }) {
        /*
        if (sender === "user") {
          return (
            <div>
              {message}
              <img src="user.png" width="35" />
            </div>
          );
        } */
      
        return (
          <div>
            {sender === "bot" && <img src="robot.png" width="35" />}
            {message}
            {sender === "user" && <img src="user.png" width="35" />}
          </div>
        );
      }

      function ChatbotInput() {
        return (
          <>
            <input 
              placeholder="send message to the chatbot" 
              size="30" />
            <button>Send</button>
          </>
        );
      }
     function App (){
      const chatMessage =[
      { message :'hello chat bot',
        sender :'user'
       },
       {
        message :'hello can i help you',
        sender :'bot'
       },
       {
        message :'Sure! You got heads',
        sender :'user'
       }
      ]
      const chatMessagecomponets = chatMessage.map((chatMessage)=>{return(<UserMessage message={chatMessage.message} sender ={chatMessage.sender}/>)
        
      })
      return(<>
          <ChatbotInput />
         {chatMessagecomponets }
        </>);
     };
     
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
