<html>
  <head>
    <title>React Basics</title>
    <link rel="stylesheet" href="styl.css">
  </head>

  <body>
    <div class="js-container"></div>
    <div></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function UserMessage({ message, sender }) {
        return (
          <div>
            {sender === "bot" && <img src="robot.png" width="35" />}
            {message}
            {sender === "user" && <img src="user.png" width="35" />}
          </div>
        );
      }

      function ChatbotInput({chatMessages,setChatMessages}) {
        const [isLoading,setIsLoading] =React.useState(false);
        const [inputText, setInputText] = React.useState("");
        
        function saveInput(event) {
          setInputText(event.target.value);
        }
        function handleKeyDown(event) {
          if (event.key === "Enter") {
            reciveMessage();
          } else if (event.key === "Escape") {
            setInputText("");
          }
        }
        async function reciveMessage() {
        if (isLoading || inputText === '') {
            return;
          }     
       
        setIsLoading(true);
        setInputText("");
        
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setChatMessages(newChatMessages);
          setChatMessages([
            ...newChatMessages,
            {
              message: "loading",
              sender: "bot",
              id: crypto.randomUUID(),
            },
          ]);

          const response = await Chatbot.getResponseAsync(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "bot",
              id: crypto.randomUUID(),
            },
          ]);
           setIsLoading(false); 
        }

        return (
          <>
            <input
              placeholder="send message to the chatbot"
              size="30"
              onChange={saveInput}
              value={inputText}
              onKeyDown={handleKeyDown}
            />
            <button onClick={reciveMessage}>Send</button>
          </>
        );
      }
      function ChatMessage({ chatMessages }) {
        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <UserMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }
      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          { message: "hello chat bot", sender: "user", id: "id1" },
          {
            message: "hello can i help you",
            sender: "bot",
            id: "id2",
          },
          {
            message: "Sure! You got heads",
            sender: "user",
            id: "id3",
          },
        ]);
        return (
          <>
          <div className="chat-messages-container">
            <ChatbotInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
            </div>
            
            <ChatMessage chatMessages={chatMessages} />
          </>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
