<html>
  <head>
    <title>React Basics</title>
    <link rel="stylesheet" href="styl.css" />
  </head>

  <body>
    <div class="js-container"></div>
    <div></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function UserMessage({ message, sender }) {
        return (
          <div
            className={
              sender === "user" ? "chat-message-user" : "chat-message-bot"
            }
          >
            {sender === "bot" && (
              <img src="robot.png" className="chat-profil" />
            )}
            <div className="chat-text">{message}</div>

            {sender === "user" && (
              <img src="user.png" className="chat-profil" />
            )}
          </div>
        );
      }

      function ChatbotInput({ chatMessages, setChatMessages }) {
        const [isLoading, setIsLoading] = React.useState(false);
        const [inputText, setInputText] = React.useState("");

        function saveInput(event) {
          setInputText(event.target.value);
        }
        function handleKeyDown(event) {
          if (event.key === "Enter") {
            reciveMessage();
          } else if (event.key === "Escape") {
            setInputText("");
          }
        }
        async function reciveMessage() {
          if (isLoading || inputText === "") {
            return;
          }

          setIsLoading(true);
          setInputText("");

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setChatMessages(newChatMessages);
          setChatMessages([
            ...newChatMessages,
            {
              message: "loading",
              sender: "bot",
              id: crypto.randomUUID(),
            },
          ]);

          const response = await Chatbot.getResponseAsync(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "bot",
              id: crypto.randomUUID(),
            },
          ]);
          setIsLoading(false);
        }

        return (
          <div className="chat-input">
            <input
              placeholder="send message to the chatbot"
              size="30"
              onChange={saveInput}
              value={inputText}
              onKeyDown={handleKeyDown}
              className="text-box"
            />
            <button onClick={reciveMessage} className="send-button">
              Send
            </button>
          </div>
        );
      }
      function ChatMessage({ chatMessages }) {
        const chatRef = React.useRef(null);
        React.useEffect(() => {
          const containerElem = chatRef.current;
          if (containerElem) {
            containerElem.scrollTop=containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div className="chat-messages-countainer" ref={chatRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <UserMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }
      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          { message: "", sender: "", id: "" },
        ]);
        return (
          <div className="app-container">
            <ChatMessage chatMessages={chatMessages}/>
            <ChatbotInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
