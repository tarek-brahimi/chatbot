<html>
  <head>
    <title>React Basics</title>
  </head>

  <body>
    <div class="js-container"></div>
    <div></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
   <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function UserMessage({ message, sender }) {
        /*
        if (sender === "user") {
          return (
            <div>
              {message}
              <img src="user.png" width="35" />
            </div>
          );
        } */

        return (
          <div>
            {sender === "bot" && <img src="robot.png" width="35" />}
            {message}
            {sender === "user" && <img src="user.png" width="35" />}
          </div>
        );
      }

      function ChatbotInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");
        function saveInput(event) {
          setInputText(event.target.value);
        }
        function reciveMessage() {
          const newChatMessages =[
            ...chatMessages,
            {
              message: inputText,
              sender:"user",
              id: crypto.randomUUID(),
            },
          ]
          setChatMessages(newChatMessages);
          const response=Chatbot.getResponse(inputText)
          setChatMessages([
            ...newChatMessages,{
              message:response,
              sender:"bot",
              id: crypto.randomUUID(),
            }
          ])
         setInputText('');
        }
        return (
          <>
            <input
              placeholder="send message to the chatbot"
              size="30"
              onChange={saveInput}
              value ={inputText}
            />
            <button onClick={reciveMessage}>Send</button>
          </>
        );
      }
      function ChatMessage({ chatMessages}) {
        return (
          <>
           
            {chatMessages.map((chatMessage) => {
              return (
                <UserMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }
      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          { message: "hello chat bot", sender: "user", id: "id1" },
          {
            message: "hello can i help you",
            sender: "bot",
            id: "id2",
          },
          {
            message: "Sure! You got heads",
            sender: "user",
            id: "id3",
          },
        ]);

        return (
          <>
            <ChatbotInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
            <ChatMessage
              chatMessages={chatMessages}
             
            />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
